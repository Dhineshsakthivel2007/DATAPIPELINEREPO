
services:
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: weather_grafana
  #   ports:
  #     - "3000:3000"
  #   restart: unless-stopped
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin # Default login: admin / admin
  #   networks:
  #     - weather_net
  postgres:
    image: postgres:15
    container_name: weather_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ADD THIS LINE:
      - ./backend/sqlschema/table.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    networks:
      - weather_net

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: weather_api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    networks:
      - weather_net

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: atmos_ui
    ports:
      - "81:80"
    depends_on:
      - backend
    networks:
      - weather_net

  airflow:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: weather_airflow
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - PYTHONPATH=/opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - ./MLmodel:/opt/airflow/MLmodel 
    ports:
      - "8080:8080"
    networks:
      - weather_net

networks:
  weather_net:
    driver: bridge

volumes:
  postgres_data: