<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATMOS | Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="brand">💠 ATMOS<span>AI</span></div>
            <ul class="nav-links">
                <li class="active">Dashboard</li>
                <!-- <li>Statistics</li>
                <li>ML Analysis</li>
                <li>Reports</li> -->
            </ul>
            <div class="search-section">
                <input type="text" id="city_input" placeholder="Query location...">
                <button id="run-btn">Analyze Data</button>
            </div>
        </nav>

        <main class="content">
            <header class="content-header">
                <h2>Analysis Overview: <span id="target-view">Global</span></h2>
                <div class="user-meta">DB Records: <span id="record-count">0</span></div>
            </header>

            <div class="kpi-row">
                <div class="kpi-card">
                    <small>Temperature</small>
                    <div class="val" id="kpi-temp">--</div>
                </div>
                <div class="kpi-card">
                    <small>Humidity</small>
                    <div class="val" id="kpi-hum">--</div>
                </div>
                <div class="kpi-card">
                    <small>Visibility</small>
                    <div class="val" id="kpi-vis">--</div>
                </div>
                <div class="kpi-card">
                    <small>Confidence Score</small>
                    <div class="val">98%</div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card span-2">
                    <h3>Temperature History</h3>
                    <div class="chart-box"><canvas id="lineChart"></canvas></div>
                </div>
                <div class="card">
                    <h3>Atmospheric Balance</h3>
                    <div class="chart-box"><canvas id="ringChart"></canvas></div>
                </div>
                <div class="card">
                    <h3>Feature Distribution</h3>
                    <div class="chart-box"><canvas id="barChart"></canvas></div>
                </div>
                <div class="card span-2">
                    <h3>Metadata Spider Analysis</h3>
                    <div class="chart-box"><canvas id="radarChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>
    <script src="weather.js" defer></script>
</body>
</html>
