<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATMOS | ML Drift Report</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo">💠 ATMOS<span>AI</span></div>
        <div class="nav-section">
            <label class="input-label">PROJECT SELECT</label>
            <select id="project-type">
                <option>weather-forecasting</option>
                <option>climate-drift-analysis</option>
            </select>
        </div>
        <div class="search-container">
            <label class="input-label">TARGET CITY</label>
            <input type="text" id="city_input" placeholder="e.g. Mumbai">
            <button id="run-btn">GENERATE REPORT</button>
        </div>
        <div class="drift-summary">
            <div class="summary-title">DRIFT DETECTED</div>
            <div class="summary-val"><span id="drift-percent">0</span>%</div>
            <div class="summary-desc">of features have drifted.</div>
        </div>
    </div>

    <main class="main-content">
        <header class="report-header">
            <h1>Report: Data drift</h1>
            <p>Analysis Period: <span id="current-date">--</span></p>
        </header>

        <section class="alert-box" id="drift-alert">
            Dataset Drift is detected.
        </section>

        <div class="table-container">
            <table class="drift-table">
                <thead>
                    <tr>
                        <th>Feature</th>
                        <th>Type</th>
                        <th>Reference Dist.</th>
                        <th>Current Dist.</th>
                        <th>Drift Status</th>
                        <th>Stat Test</th>
                    </tr>
                </thead>
                <tbody id="drift-body">
                    </tbody>
            </table>
        </div>

        <div class="charts-section">
            <div class="chart-card">
                <h3>PREDICTION DRIFT (K-S TEST)</h3>
                <div class="chart-wrapper">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>
        </div>
    </main>
    <script src="weather.js" defer></script>
</body>
</html>
